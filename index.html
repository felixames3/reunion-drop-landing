<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Felix Ames — Did The Rain Stop?</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Barlow+Condensed:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bone: #F0EAE0;
      --bone-dim: rgba(240, 234, 224, 0.55);
      --bone-faint: rgba(240, 234, 224, 0.3);
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background: #0D0B08;
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--bone);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* ---- BACKGROUND PHOTO ---- */
    .bg {
      position: fixed;
      inset: 0;
      background-image: url('artist.png');
      background-size: cover;
      background-position: center 20%;
      z-index: 0;
    }

    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(10, 8, 5, 0.88) 0%,
          rgba(10, 8, 5, 0.65) 30%,
          rgba(10, 8, 5, 0.70) 65%,
          rgba(10, 8, 5, 0.95) 100%
        );
    }

    /* Film grain overlay */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.045;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    /* ---- LAYOUT ---- */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
    }

    /* ---- TOP MARK ---- */
    .top-mark {
      position: fixed;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: 0.28em;
      color: var(--bone-dim);
      white-space: nowrap;
      text-transform: uppercase;
    }

    /* ---- MAIN CONTENT ---- */
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .artist-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--bone-dim);
      margin-bottom: 28px;
    }

    /* ---- VINYL COVER ---- */
    .cover-wrap {
      position: relative;
      width: min(340px, 82vw);
      margin-bottom: 36px;
    }

    .cover-wrap::before {
      content: '';
      position: absolute;
      inset: -1px;
      background: rgba(240, 234, 224, 0.06);
      z-index: -1;
    }

    .cover-wrap::after {
      content: '';
      position: absolute;
      bottom: -24px;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      height: 40px;
      background: rgba(0, 0, 0, 0.55);
      filter: blur(18px);
      border-radius: 50%;
      z-index: -1;
    }

    .cover-img {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border: 0.5px solid rgba(240, 234, 224, 0.12);
    }

    /* ---- TEXT ---- */
    .album-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(28px, 6vw, 44px);
      font-weight: 300;
      line-height: 1.15;
      color: var(--bone);
      letter-spacing: 0.03em;
      margin-bottom: 10px;
    }

    .drop-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--bone-faint);
      margin-bottom: 36px;
    }

    /* Hairline rule */
    .rule {
      width: 40px;
      height: 0.5px;
      background: var(--bone-faint);
      margin-bottom: 36px;
    }

    /* ---- EMAIL FORM ---- */
    .email-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 280px;
    }

    .email-input {
      width: 100%;
      background: transparent;
      border: 0.5px solid rgba(240, 234, 224, 0.35);
      padding: 14px 18px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--bone);
      outline: none;
      transition: border-color 0.25s;
      text-align: center;
    }

    .email-input::placeholder {
      color: rgba(240, 234, 224, 0.3);
      font-style: italic;
    }

    .email-input:focus {
      border-color: rgba(240, 234, 224, 0.65);
    }

    .notify-btn {
      width: 100%;
      background: transparent;
      border: 0.5px solid rgba(240, 234, 224, 0.45);
      padding: 15px 24px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--bone);
      cursor: pointer;
      transition: background 0.25s, border-color 0.25s;
    }

    .notify-btn:hover {
      background: rgba(240, 234, 224, 0.08);
      border-color: rgba(240, 234, 224, 0.7);
    }

    .notify-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    /* ---- THANK YOU STATE ---- */
    .thank-you {
      display: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(18px, 4vw, 24px);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.06em;
      color: var(--bone-dim);
      text-align: center;
    }

    /* ---- BOTTOM MARK ---- */
    .bottom-mark {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Cormorant Garamond', serif;
      font-size: 9px;
      letter-spacing: 0.25em;
      color: rgba(240, 234, 224, 0.18);
      white-space: nowrap;
      text-transform: uppercase;
    }

    /* ---- MOBILE ---- */
    @media (max-width: 480px) {
      .page { padding: 80px 28px 80px; }
      .cover-wrap { width: min(300px, 88vw); }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="grain"></div>

  <div class="top-mark">REUNION — 001</div>

  <div class="page">
    <div class="content">

      <div class="artist-name">Felix Ames</div>

      <div class="cover-wrap">
        <img class="cover-img" src="cover.png" alt="Did The Rain Stop? — Felix Ames">
      </div>

      <h1 class="album-title">Did The Rain Stop?</h1>
      <div class="drop-label">Something is coming</div>

      <div class="rule"></div>

      <form class="email-form" id="emailForm" onsubmit="handleSubmit(event)">
        <input
          class="email-input"
          type="email"
          id="emailInput"
          placeholder="your@email.com"
          required
          autocomplete="email"
        />
        <button class="notify-btn" type="submit" id="submitBtn">
          Notify Me
        </button>
      </form>

      <p class="thank-you" id="thankYou">Thank you, talk soon! &lt;3</p>

    </div>
  </div>

  <div class="bottom-mark">Felix Ames</div>

  <script>
    // Replace with your deployed command center URL, e.g. https://your-app.vercel.app
    const API_URL = 'https://www.reunionbyfelix.com/api/email-signup';

    async function handleSubmit(e) {
      e.preventDefault();

      const email = document.getElementById('emailInput').value.trim();
      if (!email) return;

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;

      // Show thank you immediately
      document.getElementById('emailForm').style.display = 'none';
      document.getElementById('thankYou').style.display = 'block';

      // Send to backend in the background (best-effort)
      try {
        await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, source: 'reunion-landing' }),
        });
      } catch (err) {
        // Silent — user already sees thank you
        console.error('Signup error:', err);
      }
    }
  </script>

</body>
</html>
