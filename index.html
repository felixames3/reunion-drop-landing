<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Felix Ames — Did The Rain Stop?</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Barlow+Condensed:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bone: #F0EAE0;
      --bone-dim: rgba(240, 234, 224, 0.55);
      --bone-faint: rgba(240, 234, 224, 0.3);
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background: #0D0B08;
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--bone);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* ---- BACKGROUND PHOTO ---- */
    .bg {
      position: fixed;
      inset: 0;
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center 30%;
      z-index: 0;
    }

    /* Gradient overlay — dark on top and bottom, lighter in middle */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(10, 8, 5, 0.82) 0%,
          rgba(10, 8, 5, 0.55) 35%,
          rgba(10, 8, 5, 0.60) 60%,
          rgba(10, 8, 5, 0.90) 100%
        );
    }

    /* Film grain overlay */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.045;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    /* ---- LAYOUT ---- */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }

    /* ---- TOP MARK ---- */
    .top-mark {
      position: fixed;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: 0.28em;
      color: var(--bone-dim);
      white-space: nowrap;
      text-transform: uppercase;
    }

    /* ---- MAIN CONTENT ---- */
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 480px;
      width: 100%;
      gap: 0;
    }

    .artist-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--bone-dim);
      margin-bottom: 18px;
    }

    .album-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 7vw, 58px);
      font-weight: 300;
      line-height: 1.1;
      color: var(--bone);
      letter-spacing: 0.03em;
      margin-bottom: 20px;
    }

    .drop-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--bone-faint);
      margin-bottom: 40px;
    }

    /* Hairline rule */
    .rule {
      width: 40px;
      height: 0.5px;
      background: var(--bone-faint);
      margin-bottom: 40px;
    }

    .body-copy {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 300;
      line-height: 1.8;
      color: var(--bone-dim);
      letter-spacing: 0.04em;
      margin-bottom: 44px;
    }

    /* ---- EMAIL FORM ---- */
    .form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
      max-width: 340px;
    }

    .email-input {
      width: 100%;
      background: rgba(240, 234, 224, 0.06);
      border: 0.5px solid rgba(240, 234, 224, 0.25);
      border-radius: 0;
      padding: 14px 18px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      letter-spacing: 0.06em;
      color: var(--bone);
      outline: none;
      transition: border-color 0.25s, background 0.25s;
      text-align: center;
      -webkit-appearance: none;
    }

    .email-input::placeholder {
      color: rgba(240, 234, 224, 0.3);
      letter-spacing: 0.12em;
      font-size: 12px;
      text-transform: uppercase;
    }

    .email-input:focus {
      border-color: rgba(240, 234, 224, 0.5);
      background: rgba(240, 234, 224, 0.09);
    }

    .submit-btn {
      width: 100%;
      background: transparent;
      border: 0.5px solid rgba(240, 234, 224, 0.4);
      padding: 13px 18px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--bone);
      cursor: pointer;
      transition: background 0.25s, border-color 0.25s;
    }

    .submit-btn:hover {
      background: rgba(240, 234, 224, 0.08);
      border-color: rgba(240, 234, 224, 0.65);
    }

    .submit-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ---- STATES ---- */
    .status-msg {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      letter-spacing: 0.1em;
      color: var(--bone-dim);
      text-align: center;
      min-height: 20px;
      font-style: italic;
    }

    .status-msg.success {
      color: rgba(210, 195, 160, 0.8);
    }

    .status-msg.error {
      color: rgba(200, 160, 130, 0.8);
    }

    /* ---- BOTTOM MARK ---- */
    .bottom-mark {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Cormorant Garamond', serif;
      font-size: 9px;
      letter-spacing: 0.25em;
      color: rgba(240, 234, 224, 0.18);
      white-space: nowrap;
      text-transform: uppercase;
    }

    /* ---- MOBILE ---- */
    @media (max-width: 480px) {
      .page { padding: 80px 28px 80px; }
      .album-title { font-size: 40px; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="grain"></div>

  <div class="top-mark">REUNION — 001</div>

  <div class="page">
    <div class="content">

      <div class="artist-name">Felix Ames</div>
      <h1 class="album-title">Did The Rain Stop?</h1>
      <div class="drop-label">Reunion Drop 001</div>

      <div class="rule"></div>

      <p class="body-copy">Vinyls coming soon. Be the first to know when they drop!</p>

      <form class="form" id="waitlistForm">
        <input
          class="email-input"
          type="email"
          id="emailInput"
          placeholder="Your email"
          required
          autocomplete="email"
        />
        <button class="submit-btn" type="submit" id="submitBtn">
          Join the List
        </button>
        <div class="status-msg" id="statusMsg"></div>
      </form>

    </div>
  </div>

  <div class="bottom-mark">Felix Ames</div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL  = 'https://iefrawbiveavwcopmhtw.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImllZnJhd2JpdmVhdndjb3BtaHR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxNjQ1NjgsImV4cCI6MjA4NDc0MDU2OH0.SQ9549OY6AqEhxjUS2Zj0lKQbInns34Z6P-RvBGcqDk';

    let db;

    document.addEventListener('DOMContentLoaded', () => {
      db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

      document.getElementById('waitlistForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email     = document.getElementById('emailInput').value.trim();
        const btn       = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('statusMsg');

        if (!email) return;

        btn.disabled    = true;
        btn.textContent = 'Adding...';
        statusMsg.className   = 'status-msg';
        statusMsg.textContent = '';

        try {
          const { error } = await db
            .from('drop_waitlist')
            .insert({ email, drop: 'reunion-001', signed_up_at: new Date().toISOString() });

          if (error) {
            if (error.code === '23505') {
              statusMsg.className   = 'status-msg success';
              statusMsg.textContent = "You're already on the list.";
            } else {
              statusMsg.className   = 'status-msg error';
              statusMsg.textContent = 'Something went wrong. Try again.';
              btn.disabled    = false;
              btn.textContent = 'Join the List';
            }
          } else {
            statusMsg.className   = 'status-msg success';
            statusMsg.textContent = 'Thank you, talk soon! <3';
            document.getElementById('emailInput').value = '';
            btn.textContent = 'Done';
          }
        } catch (err) {
          statusMsg.className   = 'status-msg error';
          statusMsg.textContent = 'Something went wrong. Try again.';
          btn.disabled    = false;
          btn.textContent = 'Join the List';
        }
      });
    });
  </script>

</body>
</html>
